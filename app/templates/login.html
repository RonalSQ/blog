<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubsHub - Iniciar Sesión</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Satoshi', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#01696f', 900: '#134e4a', 950: '#042f2e' },
                        base: { light: '#f7f6f2', dark: '#121212', cardLight: '#ffffff', cardDark: '#1e1e1e', textLight: '#28251d', textDark: '#e4e4e7' }
                    },
                    fontSize: {
                        'fluid-base': 'clamp(1rem, 1vw + 0.8rem, 1.125rem)',
                        'fluid-3xl': 'clamp(2.5rem, 4vw + 1.5rem, 4.5rem)',
                    },
                    spacing: { 'fluid-gutter': 'clamp(1rem, 3vw, 3rem)', 'fluid-section': 'clamp(4rem, 8vw, 8rem)' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-base-light text-base-textLight font-sans antialiased transition-colors duration-300; }
            .dark body { @apply bg-base-dark text-base-textDark; }
        }
        @layer components {
            .btn { @apply inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full font-medium transition-all duration-300 active:scale-95; }
            .card { @apply bg-base-cardLight dark:bg-base-cardDark rounded-2xl overflow-hidden border border-black/5 dark:border-white/5 transition-all duration-500 hover:shadow-2xl; }
            .form-input { @apply w-full px-4 py-3 rounded-xl bg-white dark:bg-base-cardDark border border-black/10 dark:border-white/10 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all text-base-textLight dark:text-base-textDark; }
            .form-label { @apply block text-sm font-medium mb-1 text-base-textLight/80 dark:text-base-textDark/80; }
        }
        .gsap-reveal { opacity: 0; transform: translateY(40px); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ view: 'login' }"
      x-init="setTimeout(() => { lucide.createIcons(); gsap.to('.gsap-reveal', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out', stagger: 0.1 }); }, 50)"
      class="overflow-x-hidden min-h-screen flex flex-col">

    {% include 'auth_header.html' %}

    <main class="flex-1 w-full max-w-[1920px] mx-auto px-fluid-gutter pt-24 pb-fluid-section flex items-center justify-center">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="flex justify-center mb-8 gsap-reveal">
                <div class="w-16 h-16 bg-brand-800 dark:bg-brand-500 rounded-2xl flex items-center justify-center text-white dark:text-brand-950 shadow-2xl shadow-brand-800/20 rotate-12">
                    <i data-lucide="atom" class="w-8 h-8 -rotate-12"></i>
                </div>
            </div>

            <div class="card p-8 gsap-reveal">
                <!-- Navigation Tabs -->
                <div class="flex border-b border-black/10 dark:border-white/10 mb-8">
                    <a href="{% url 'login' %}"
                       class="flex-1 pb-4 text-center font-bold text-sm transition-colors relative text-brand-800 dark:text-brand-400">
                        Iniciar Sesión
                        <div class="absolute bottom-0 left-0 w-full h-0.5 bg-brand-800 dark:bg-brand-400"></div>
                    </a>
                    <a href="{% url 'registro' %}"
                       class="flex-1 pb-4 text-center font-bold text-sm transition-colors relative text-base-textLight/50 dark:text-base-textDark/50 hover:text-base-textLight dark:hover:text-white">
                        Crear Cuenta
                        <div class="absolute bottom-0 left-0 w-full h-0.5 bg-transparent"></div>
                    </a>
                </div>

                <!-- Mensajes de Django -->
                {% if messages %}
                <div class="mb-6">
                    {% for message in messages %}
                    <div class="p-3 rounded-xl text-sm font-medium flex items-center gap-2 mb-2
                        {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100 dark:bg-red-900/20 dark:border-red-900/30
                        {% else %}bg-green-50 text-green-700 border border-green-100 dark:bg-green-900/20 dark:border-green-800/30{% endif %}">
                        <i data-lucide="{% if message.tags == 'error' %}alert-circle{% else %}check-circle{% endif %}" class="w-4 h-4 flex-shrink-0"></i>
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <!-- Login Form -->
                <div x-show="view === 'login'"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 translate-x-8"
                     x-transition:enter-end="opacity-100 translate-x-0"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100 translate-x-0"
                     x-transition:leave-end="opacity-0 -translate-x-8">
                    <form method="POST" action="{% url 'login' %}" class="flex flex-col gap-5">
                        {% csrf_token %}
                        <div>
                            <label class="form-label" for="id_username">Usuario</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-base-textLight/40"></i>
                                <input type="text" id="id_username" name="username" required
                                       class="form-input pl-12" placeholder="Tu nombre de usuario"
                                       autocomplete="username">
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="form-label mb-0" for="id_password">Contraseña</label>
                                <a href="{% url 'password_reset' %}" class="text-xs font-bold text-brand-800 dark:text-brand-400 hover:underline">
                                    ¿Olvidaste tu contraseña?
                                </a>
                            </div>
                            <div class="relative">
                                <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-base-textLight/40"></i>
                                <input type="password" id="id_password" name="password" required
                                       class="form-input pl-12" placeholder="••••••••"
                                       autocomplete="current-password">
                            </div>
                        </div>
                        <input type="hidden" name="next" value="{{ next }}">
                        <button type="submit" class="btn bg-brand-800 text-white hover:bg-brand-700 shadow-lg w-full mt-2 group">
                            Entrar <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                        </button>
                    </form>
                </div>

            </div>

            <!-- Link a registro -->
            <p class="text-center text-sm text-base-textLight/60 dark:text-base-textDark/60 mt-6 gsap-reveal">
                ¿No tienes cuenta?
                <a href="{% url 'registro' %}" class="text-brand-800 dark:text-brand-400 font-bold hover:underline">Registírate aquí</a>
            </p>

        </div>
    </main>

    <footer class="py-12 border-t border-black/5 dark:border-white/5 bg-white dark:bg-black/20">
        <div class="w-full max-w-[1920px] mx-auto px-fluid-gutter flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2">
                <i data-lucide="atom" class="w-6 h-6 text-brand-800 dark:text-brand-500"></i>
                <span class="font-black text-xl">ClubsHub</span>
            </div>
            <p class="text-sm text-base-textLight/60 dark:text-base-textDark/60 font-medium tracking-wide">
                &copy; 2026 Universidad. Plataforma de Clubes.
            </p>
        </div>
    </footer>
</body>
</html>
