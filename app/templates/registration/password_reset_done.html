<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubsHub - Correo Enviado</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Satoshi', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#01696f', 900: '#134e4a', 950: '#042f2e' },
                        base: { light: '#f7f6f2', dark: '#121212', cardLight: '#ffffff', cardDark: '#1e1e1e', textLight: '#28251d', textDark: '#e4e4e7' }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-base-light text-base-textLight font-sans antialiased transition-colors duration-300; }
            .dark body { @apply bg-base-dark text-base-textDark; }
        }
        .card { @apply bg-base-cardLight dark:bg-base-cardDark rounded-2xl overflow-hidden border border-black/5 dark:border-white/5 shadow-xl; }
        .btn { @apply inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full font-medium transition-all duration-300 active:scale-95 bg-brand-800 text-white hover:bg-brand-700 shadow-lg; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center" onload="lucide.createIcons()">
    
    <div class="w-full max-w-md px-4">
        <div class="flex justify-center mb-8">
            <div class="w-16 h-16 bg-brand-800 dark:bg-brand-500 rounded-2xl flex items-center justify-center text-white dark:text-brand-950 shadow-2xl shadow-brand-800/20 rotate-12">
                <i data-lucide="mail-check" class="w-8 h-8 -rotate-12"></i>
            </div>
        </div>

        <div class="card p-8 text-center">
            <h2 class="text-2xl font-black mb-4">Revisa tu bandeja de entrada</h2>
            <p class="text-base-textLight/70 dark:text-base-textDark/70 mb-6 leading-relaxed">
                Te hemos enviado un correo con instrucciones para restablecer tu contraseña. Si no lo ves, revisa tu carpeta de spam o correo no deseado.
            </p>
            <a href="{% url 'login' %}" class="btn w-full">Volver a Iniciar Sesión</a>
        </div>
    </div>

</body>
</html>
