<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubsHub - Crear Cuenta</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Satoshi', 'sans-serif'] },
                    colors: {
                        brand: { 50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#01696f',900:'#134e4a',950:'#042f2e' },
                        base: { light:'#f7f6f2',dark:'#121212',cardLight:'#ffffff',cardDark:'#1e1e1e',textLight:'#28251d',textDark:'#e4e4e7' }
                    },
                    fontSize: { 'fluid-base':'clamp(1rem, 1vw + 0.8rem, 1.125rem)' },
                    spacing: { 'fluid-gutter':'clamp(1rem, 3vw, 3rem)', 'fluid-section':'clamp(4rem, 8vw, 8rem)' }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base { body { @apply bg-base-light text-base-textLight font-sans antialiased transition-colors duration-300; } .dark body { @apply bg-base-dark text-base-textDark; } }
        @layer components {
            .btn { @apply inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full font-medium transition-all duration-300 active:scale-95; }
            .card { @apply bg-base-cardLight dark:bg-base-cardDark rounded-2xl overflow-hidden border border-black/5 dark:border-white/5 transition-all duration-500 hover:shadow-2xl; }
            .form-input { @apply w-full px-4 py-3 rounded-xl bg-white dark:bg-base-cardDark border border-black/10 dark:border-white/10 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all text-base-textLight dark:text-base-textDark; }
            .form-label { @apply block text-sm font-medium mb-1 text-base-textLight/80 dark:text-base-textDark/80; }
        }
        .gsap-reveal { opacity: 0; transform: translateY(40px); }
    </style>
</head>
<body x-data x-init="setTimeout(() => { lucide.createIcons(); gsap.to('.gsap-reveal', { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out', stagger: 0.05 }); }, 10)"
      class="overflow-x-hidden min-h-screen flex flex-col">

    {% include 'auth_header.html' %}

    <main class="flex-1 w-full max-w-[1920px] mx-auto px-fluid-gutter pt-24 pb-fluid-section flex items-center justify-center">
        <div class="w-full max-w-lg">

            <!-- Logo -->
            <div class="flex justify-center mb-8 gsap-reveal">
                <div class="w-16 h-16 bg-brand-800 dark:bg-brand-500 rounded-2xl flex items-center justify-center text-white dark:text-brand-950 shadow-2xl shadow-brand-800/20 rotate-12">
                    <i data-lucide="atom" class="w-8 h-8 -rotate-12"></i>
                </div>
            </div>

            <div class="text-center mb-8 gsap-reveal">
                <h1 class="text-3xl font-black mb-2">Crear una cuenta</h1>
                <p class="text-base-textLight/60 dark:text-base-textDark/60">
                    ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-brand-800 dark:text-brand-400 font-bold hover:underline">Inicia sesión aquí</a>
                </p>
            </div>

            <div class="card p-8 gsap-reveal">
                <!-- Mensajes de Django -->
                {% if messages %}
                <div class="mb-6">
                    {% for message in messages %}
                    <div class="p-3 rounded-xl text-sm font-medium flex items-center gap-2 mb-2
                        {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100 dark:bg-red-900/20
                        {% else %}bg-green-50 text-green-700 border border-green-100 dark:bg-green-900/20{% endif %}">
                        <i data-lucide="{% if message.tags == 'error' %}alert-circle{% else %}check-circle{% endif %}" class="w-4 h-4 flex-shrink-0"></i>
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="POST" action="{% url 'registro' %}" class="flex flex-col gap-5">
                    {% csrf_token %}

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="form-label" for="id_first_name">Nombre</label>
                            <input type="text" id="id_first_name" name="first_name" required
                                   class="form-input" placeholder="Tu nombre"
                                   value="{{ request.POST.first_name|default:'' }}">
                        </div>
                        <div>
                            <label class="form-label" for="id_last_name">Apellido</label>
                            <input type="text" id="id_last_name" name="last_name" required
                                   class="form-input" placeholder="Tu apellido"
                                   value="{{ request.POST.last_name|default:'' }}">
                        </div>
                    </div>

                    <div>
                        <label class="form-label" for="id_username">Nombre de usuario</label>
                        <div class="relative">
                            <i data-lucide="at-sign" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-base-textLight/40"></i>
                            <input type="text" id="id_username" name="username" required
                                   class="form-input pl-12" placeholder="usuario123"
                                   value="{{ request.POST.username|default:'' }}"
                                   autocomplete="username">
                        </div>
                    </div>

                    <div>
                        <label class="form-label" for="id_email">Correo Institucional</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-base-textLight/40"></i>
                            <input type="email" id="id_email" name="email" required
                                   class="form-input pl-12" placeholder="correo@institución.edu"
                                   value="{{ request.POST.email|default:'' }}"
                                   autocomplete="email">
                        </div>
                    </div>

                    <div>
                        <label class="form-label" for="id_password1">Contraseña</label>
                        <div class="relative" x-data="{ showPwd1: false }">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-base-textLight/40"></i>
                            <input :type="showPwd1 ? 'text' : 'password'" id="id_password1" name="password1" required
                                   class="form-input pl-12 pr-12" placeholder="Mínimo 8 caracteres"
                                   autocomplete="new-password">
                            <button type="button" @click="showPwd1 = !showPwd1"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-base-textLight/40 hover:text-base-textLight transition-colors">
                                <i :data-lucide="showPwd1 ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="form-label" for="id_password2">Confirmar Contraseña</label>
                        <div class="relative" x-data="{ showPwd2: false }">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-base-textLight/40"></i>
                            <input :type="showPwd2 ? 'text' : 'password'" id="id_password2" name="password2" required
                                   class="form-input pl-12 pr-12" placeholder="Repite la contraseña"
                                   autocomplete="new-password">
                            <button type="button" @click="showPwd2 = !showPwd2"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-base-textLight/40 hover:text-base-textLight transition-colors">
                                <i :data-lucide="showPwd2 ? 'eye-off' : 'eye'" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <p class="text-xs text-base-textLight/50 dark:text-base-textDark/50 mt-2">
                            La contraseña debe tener mínimo 8 caracteres.
                        </p>
                    </div>

                    <button type="submit" class="btn bg-brand-800 text-white hover:bg-brand-700 shadow-lg w-full mt-2 group">
                        Crear Cuenta
                        <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-black/5 dark:border-white/5 bg-white dark:bg-black/20">
        <div class="w-full max-w-[1920px] mx-auto px-fluid-gutter flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2">
                <i data-lucide="atom" class="w-6 h-6 text-brand-800 dark:text-brand-500"></i>
                <span class="font-black text-xl">ClubsHub</span>
            </div>
            <p class="text-sm text-base-textLight/60 dark:text-base-textDark/60 font-medium tracking-wide">
                &copy; 2026 Universidad. Plataforma de Clubes.
            </p>
        </div>
    </footer>
</body>
</html>
